<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crítica Fotográfica · Alexandra | Fotografia</title>
  <meta name="description" content="Análise crítica profissional de fotografias por inteligência artificial especializada." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --bg2: #111111;
      --bg3: #161616;
      --border: #1E1E1E;
      --border2: #2A2A2A;
      --border3: #3A3A3A;
      --text: #E8E0D4;
      --text2: #A8A098;
      --text3: #666666;
      --gold: #C8A860;
      --gold2: #E8D0A0;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* HEADER */
    .header {
      border-bottom: 1px solid var(--border2);
      padding: 32px 24px 24px;
      text-align: center;
    }
    .header-eyebrow {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 400;
      letter-spacing: 3px;
      color: #F0E8D8;
      margin-bottom: 8px;
    }
    .header-sub {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* MAIN */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 1px dashed var(--border3);
      border-radius: 2px;
      padding: 60px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover { border-color: var(--gold); }
    .upload-zone.has-image {
      padding: 16px;
      border-color: var(--gold);
      background: var(--bg2);
    }
    .upload-zone-icon {
      font-size: 40px;
      opacity: 0.25;
      margin-bottom: 16px;
      display: block;
    }
    .upload-zone-label {
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--text3);
      text-transform: uppercase;
    }
    .upload-zone-hint {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
    .preview-img {
      max-height: 460px;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }
    .preview-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.75);
      padding: 4px 12px;
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* LABEL */
    .field-label {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    /* TEXTAREA */
    textarea {
      width: 100%;
      background: #141414;
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: #C8C0B4;
      padding: 12px 14px;
      font-size: 13px;
      font-family: Georgia, serif;
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--border3); }
    textarea::placeholder { color: #444; }

    /* BUTTON */
    .btn-analyze {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 2px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-analyze:hover { opacity: 0.85; }
    .btn-analyze:disabled {
      background: var(--border2);
      color: #444;
      cursor: not-allowed;
      opacity: 1;
    }

    /* LOADING */
    .loading {
      margin-top: 28px;
      text-align: center;
    }
    .loading-bar {
      width: 100px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 14px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
    .loading-text {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text3);
      text-transform: uppercase;
    }

    /* ERROR */
    .error-box {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #6B2020;
      background: #1A0808;
      color: #D49090;
      font-family: Arial, sans-serif;
      font-size: 13px;
      border-radius: 2px;
    }

    /* REPORT HEADER */
    .report-header {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .report-thumb {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      filter: brightness(0.88);
    }
    .report-meta { flex: 1; min-width: 200px; }
    .report-meta-label {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .veredito-badge {
      display: inline-block;
      padding: 6px 18px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .report-excerpt {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--text3);
      line-height: 1.6;
    }
    .btn-new {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--border3);
      color: var(--text3);
      padding: 6px 16px;
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-new:hover { border-color: var(--gold); color: var(--gold); }

    /* ACCORDION */
    .section-card {
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .section-card.open { border-color: var(--border3); }
    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg2);
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .section-card.open .section-toggle { background: var(--bg3); }
    .section-toggle:hover { background: var(--bg3); }
    .section-icon {
      font-size: 15px;
      opacity: 0.85;
      flex-shrink: 0;
      line-height: 1;
    }
    .section-title {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text3);
      text-transform: uppercase;
      font-weight: 600;
      flex: 1;
      transition: color 0.15s;
    }
    .section-card.open .section-title { color: inherit; }
    .section-arrow {
      color: #444;
      font-size: 20px;
      font-family: Arial, sans-serif;
      transition: transform 0.2s;
      line-height: 1;
    }
    .section-card.open .section-arrow { transform: rotate(90deg); }
    .section-body {
      padding: 20px 20px 20px 48px;
      background: #0F0F0F;
      border-top: 1px solid var(--border);
      display: none;
    }
    .section-card.open .section-body { display: block; }
    .section-body p {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.85;
      color: var(--text2);
      font-family: Georgia, serif;
    }
    .section-body p.bold-line {
      color: #D8C8A8;
      font-family: Arial, sans-serif;
      font-weight: 500;
      font-size: 13px;
    }
    .section-body .spacer { height: 8px; }

    /* FOOTER */
    .footer {
      border-top: 1px solid #1A1A1A;
      padding: 20px 24px;
      text-align: center;
      margin-top: 40px;
    }
    .footer-text {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: #2A2A2A;
      text-transform: uppercase;
    }

    /* SPACING UTILS */
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .mt24 { margin-top: 24px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-eyebrow">Direção de Arte · Curadoria Editorial</div>
    <h1>CRÍTICA FOTOGRÁFICA</h1>
    <div class="header-sub">Análise por Inteligência Artificial Especializada</div>
  </header>

  <main class="main">

    <!-- UPLOAD FORM -->
    <div id="upload-section">

      <div
        class="upload-zone"
        id="dropzone"
        onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault()"
        ondrop="handleDrop(event)"
      >
        <span class="upload-zone-icon">◎</span>
        <div class="upload-zone-label">Arraste sua fotografia aqui</div>
        <div class="upload-zone-hint">ou toque para selecionar</div>
        <img class="preview-img" id="preview-img" style="display:none" alt="preview" />
        <div class="preview-badge" id="preview-badge" style="display:none">TROCAR FOTO</div>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileInput(this)" />

      <div class="mt20">
        <label class="field-label" for="context-input">Contexto do ensaio (opcional)</label>
        <textarea
          id="context-input"
          placeholder="Ex: sessão de maternidade, luz natural, estúdio, intenção artística..."
        ></textarea>
      </div>

      <button class="btn-analyze" id="btn-analyze" onclick="analyze()" disabled>
        SELECIONE UMA FOTO
      </button>

      <div class="loading" id="loading" style="display:none">
        <div class="loading-bar"></div>
        <div class="loading-text">O Diretor de Arte está avaliando sua imagem...</div>
      </div>

      <div class="error-box" id="error-box" style="display:none"></div>
    </div>

    <!-- REPORT -->
    <div id="report-section" style="display:none"></div>

  </main>

  <footer class="footer">
    <div class="footer-text">Alexandra | Fotografia · Análise Crítica Profissional</div>
  </footer>

<script>
const SYSTEM_PROMPT = `Você é um Diretor de Arte, Editor de Fotografia e Curador Editorial com mais de 20 anos de experiência avaliando imagens para revistas internacionais, campanhas publicitárias e portfólios profissionais.

Sua missão NÃO é agradar o fotógrafo.
Sua missão NÃO é apenas dar notas.
Sua missão é ENSINAR o fotógrafo a enxergar como um profissional.

Considere que o usuário é um fotógrafo iniciante ou intermediário que deseja desenvolver olhar crítico.

Sempre explique o motivo de cada observação.
Nunca utilize frases genéricas como "Está bonita.", "Gostei.", "Boa composição." — explique exatamente POR QUÊ.

Sempre diferencie: Erro técnico | Erro estético | Erro de direção | Erro de edição | Erro de narrativa | Erro de composição

Quando encontrar um problema, explique:
1. O que aconteceu.
2. Por que isso reduz a qualidade profissional.
3. Como um fotógrafo experiente resolveria.
4. Como o usuário pode treinar esse aspecto nos próximos ensaios.

Nunca critique sem ensinar. Nunca elogie sem justificar.

Produza o relatório EXATAMENTE neste formato, usando os separadores e títulos abaixo:

---PRIMEIRA IMPRESSÃO---
O que senti nos primeiros três segundos olhando esta fotografia?

---A FOTO PARECE PROFISSIONAL---
Responda: SIM / SIM, COM RESSALVAS / NÃO
Explique detalhadamente.

---O QUE DENUNCIA AMADORISMO---
Liste e explique cada elemento que denuncia falta de nível profissional.

---O QUE TRANSMITE PROFISSIONALISMO---
Liste e explique cada ponto forte.

---ANÁLISE DA LUZ---
Analise: direção, intensidade, contraste, profundidade, separação do fundo, textura, volume. Explique como melhorar.

---ANÁLISE DA COMPOSIÇÃO---
Analise: enquadramento, linhas, equilíbrio, cortes, distribuição visual, distrações.

---ANÁLISE DA DIREÇÃO---
Analise: pose, expressão, mãos, olhar, naturalidade, conexão emocional.

---ANÁLISE DA EDIÇÃO---
Avalie: cor, contraste, pele, textura, nitidez, vinheta, consistência. Explique se a edição parece profissional ou denuncia excesso de tratamento.

---TESTE INSTAGRAM---
Se esta foto aparecesse no feed de um fotógrafo profissional conhecido, chamaria atenção? Por quê?

---TESTE PORTFÓLIO---
Você incluiria esta fotografia em um portfólio profissional? Explique.

---TESTE VOGUE---
Esta fotografia possui linguagem visual de editorial? Se não, explique exatamente o que falta.

---AS 3 MUDANÇAS---
Escolha apenas três mudanças que mais elevariam esta foto. Explique por que essas três são as mais importantes.

---PLANO DE ESTUDO---
Transforme os erros encontrados em exercícios práticos para treino.

---VEREDITO FINAL---
Classifique em UMA destas categorias:
Foto comum | Boa foto amadora | Iniciante promissor | Semiprofissional | Profissional | Editorial | Campanha internacional

Explique detalhadamente por que escolheu essa categoria.`;

const SECTIONS = [
  { key: "PRIMEIRA IMPRESSÃO", icon: "◎", color: "#E8D5B0" },
  { key: "A FOTO PARECE PROFISSIONAL", icon: "◈", color: "#B8C9D9" },
  { key: "O QUE DENUNCIA AMADORISMO", icon: "▽", color: "#D4A5A5" },
  { key: "O QUE TRANSMITE PROFISSIONALISMO", icon: "△", color: "#A5C4A5" },
  { key: "ANÁLISE DA LUZ", icon: "◐", color: "#F0D090" },
  { key: "ANÁLISE DA COMPOSIÇÃO", icon: "⊞", color: "#C4B8D9" },
  { key: "ANÁLISE DA DIREÇÃO", icon: "◇", color: "#D9C4B8" },
  { key: "ANÁLISE DA EDIÇÃO", icon: "◑", color: "#B8D9D4" },
  { key: "TESTE INSTAGRAM", icon: "◉", color: "#E8C4D4" },
  { key: "TESTE PORTFÓLIO", icon: "◈", color: "#D4E8C4" },
  { key: "TESTE VOGUE", icon: "◎", color: "#C4D4E8" },
  { key: "AS 3 MUDANÇAS", icon: "▲", color: "#F0C890" },
  { key: "PLANO DE ESTUDO", icon: "◫", color: "#C8D4E8" },
  { key: "VEREDITO FINAL", icon: "★", color: "#E8D0A0" },
];

const VEREDITO_COLORS = {
  "Foto comum": "#888",
  "Boa foto amadora": "#A0B4C8",
  "Iniciante promissor": "#8FBC8F",
  "Semiprofissional": "#DAA520",
  "Profissional": "#C0A060",
  "Editorial": "#B89BC8",
  "Campanha internacional": "#E8C060",
};

const SEPARATORS = [
  "---PRIMEIRA IMPRESSÃO---",
  "---A FOTO PARECE PROFISSIONAL---",
  "---O QUE DENUNCIA AMADORISMO---",
  "---O QUE TRANSMITE PROFISSIONALISMO---",
  "---ANÁLISE DA LUZ---",
  "---ANÁLISE DA COMPOSIÇÃO---",
  "---ANÁLISE DA DIREÇÃO---",
  "---ANÁLISE DA EDIÇÃO---",
  "---TESTE INSTAGRAM---",
  "---TESTE PORTFÓLIO---",
  "---TESTE VOGUE---",
  "---AS 3 MUDANÇAS---",
  "---PLANO DE ESTUDO---",
  "---VEREDITO FINAL---",
];

let currentImageBase64 = null;
let currentImageMime = null;
let currentImageURL = null;

function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) loadFile(file);
}

function handleFileInput(input) {
  if (input.files[0]) loadFile(input.files[0]);
}

function loadFile(file) {
  currentImageMime = file.type || "image/jpeg";
  currentImageURL = URL.createObjectURL(file);

  const zone = document.getElementById("dropzone");
  const img = document.getElementById("preview-img");
  const badge = document.getElementById("preview-badge");
  const btn = document.getElementById("btn-analyze");

  zone.classList.add("has-image");
  zone.querySelector(".upload-zone-icon").style.display = "none";
  zone.querySelector(".upload-zone-label").style.display = "none";
  zone.querySelector(".upload-zone-hint").style.display = "none";
  img.src = currentImageURL;
  img.style.display = "block";
  badge.style.display = "block";

  btn.disabled = false;
  btn.textContent = "ANALISAR FOTOGRAFIA";

  document.getElementById("error-box").style.display = "none";

  // Compress image to avoid Safari request size limits
  const canvas = document.createElement("canvas");
  const imgEl = new Image();
  imgEl.onload = function() {
    const MAX = 1200;
    let w = imgEl.width, h = imgEl.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(imgEl, 0, 0, w, h);
    const dataURL = canvas.toDataURL("image/jpeg", 0.85);
    currentImageBase64 = dataURL.split(",")[1];
    currentImageMime = "image/jpeg";
  };
  imgEl.src = currentImageURL;
}

function parseReport(text) {
  const sections = {};
  for (let i = 0; i < SEPARATORS.length; i++) {
    const sep = SEPARATORS[i];
    const nextSep = SEPARATORS[i + 1];
    const start = text.indexOf(sep);
    if (start === -1) continue;
    const contentStart = start + sep.length;
    const end = nextSep ? text.indexOf(nextSep) : text.length;
    sections[SECTIONS[i].key] = text.slice(contentStart, end !== -1 ? end : undefined).trim();
  }
  return sections;
}

function getVeredito(text) {
  const cats = ["Campanha internacional","Editorial","Profissional","Semiprofissional","Iniciante promissor","Boa foto amadora","Foto comum"];
  for (const c of cats) { if (text && text.includes(c)) return c; }
  return null;
}

async function analyze() {
  if (!currentImageBase64) return;

  const btn = document.getElementById("btn-analyze");
  const loading = document.getElementById("loading");
  const errorBox = document.getElementById("error-box");

  btn.disabled = true;
  btn.textContent = "ANALISANDO...";
  loading.style.display = "block";
  errorBox.style.display = "none";

  const context = document.getElementById("context-input").value.trim();

  try {
    const res = await fetch("https://critica-foto.edeumapa.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: currentImageMime, data: currentImageBase64 }
            },
            {
              type: "text",
              text: context
                ? `Analise esta fotografia como Diretor de Arte.\n\nContexto fornecido pelo fotógrafo: ${context}`
                : "Analise esta fotografia como Diretor de Arte."
            }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(typeof data.error === "string" ? data.error : data.error.message || "Erro da API");

    const text = (data.content || []).map(b => b.text || "").join("\n");
    const report = parseReport(text);

    renderReport(report, text);

  } catch (err) {
    errorBox.textContent = "Erro: " + (err.message || "Tente novamente.");
    errorBox.style.display = "block";
    btn.disabled = false;
    btn.textContent = "ANALISAR FOTOGRAFIA";
  } finally {
    loading.style.display = "none";
  }
}

function renderReport(report, rawText) {
  document.getElementById("upload-section").style.display = "none";
  const sec = document.getElementById("report-section");
  sec.style.display = "block";

  const veredito = getVeredito(report["VEREDITO FINAL"]);
  const vereditoColor = VEREDITO_COLORS[veredito] || "#C8A860";
  const excerpt = (report["PRIMEIRA IMPRESSÃO"] || "").slice(0, 200);

  let html = `
    <div class="report-header">
      <img class="report-thumb" src="${currentImageURL}" alt="foto analisada" />
      <div class="report-meta">
        <div class="report-meta-label">Classificação Final</div>
        ${veredito ? `<div class="veredito-badge" style="border-color:${vereditoColor};color:${vereditoColor}">${veredito}</div>` : ""}
        <div class="report-excerpt">${excerpt}${excerpt.length === 200 ? "…" : ""}</div>
        <button class="btn-new" onclick="resetApp()">← Nova Análise</button>
      </div>
    </div>
  `;

  let hasAny = false;
  SECTIONS.forEach((s) => {
    const content = report[s.key];
    if (!content) return;
    hasAny = true;

    const lines = content.split("\n").map(line => {
      if (!line.trim()) return `<div class="spacer"></div>`;
      const isBold = line.startsWith("**") || /^\d+\./.test(line) || line.startsWith("•") || line.startsWith("-");
      const clean = line.replace(/\*\*/g, "");
      return `<p class="${isBold ? "bold-line" : ""}">${clean}</p>`;
    }).join("");

    html += `
      <div class="section-card" id="card-${s.key.replace(/\s/g,'_')}">
        <button class="section-toggle" onclick="toggleSection('${s.key.replace(/\s/g,'_')}')">
          <span class="section-icon" style="color:${s.color}">${s.icon}</span>
          <span class="section-title" style="--accent:${s.color}">${s.key}</span>
          <span class="section-arrow">›</span>
        </button>
        <div class="section-body">${lines}</div>
      </div>
    `;
  });

  if (!hasAny && rawText) {
    html += `<div style="padding:24px;background:#111;border:1px solid #2A2A2A;border-radius:2px;font-size:14px;line-height:1.85;color:#A8A098;white-space:pre-wrap;font-family:Georgia,serif">${rawText}</div>`;
  }

  sec.innerHTML = html;

  // Open first section
  const firstCard = sec.querySelector(".section-card");
  if (firstCard) firstCard.classList.add("open");
}

function toggleSection(key) {
  const card = document.getElementById("card-" + key);
  if (!card) return;
  card.classList.toggle("open");
}

function resetApp() {
  currentImageBase64 = null;
  currentImageMime = null;
  currentImageURL = null;

  document.getElementById("report-section").style.display = "none";
  document.getElementById("report-section").innerHTML = "";
  document.getElementById("upload-section").style.display = "block";

  const zone = document.getElementById("dropzone");
  zone.classList.remove("has-image");
  zone.querySelector(".upload-zone-icon").style.display = "block";
  zone.querySelector(".upload-zone-label").style.display = "block";
  zone.querySelector(".upload-zone-hint").style.display = "block";

  const img = document.getElementById("preview-img");
  img.style.display = "none";
  img.src = "";
  document.getElementById("preview-badge").style.display = "none";

  const btn = document.getElementById("btn-analyze");
  btn.disabled = true;
  btn.textContent = "SELECIONE UMA FOTO";

  document.getElementById("context-input").value = "";
  document.getElementById("error-box").style.display = "none";
  document.getElementById("file-input").value = "";
}
</script>
</body>
</html>
